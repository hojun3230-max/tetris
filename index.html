<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 테트리스</title>
    <style>
        body {
            background-color: #20232a;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 10px; color: #61dafb; }
        #game-container { position: relative; }
        canvas {
            border: 4px solid #61dafb;
            background-color: #111;
            box-shadow: 0 0 20px rgba(97, 218, 251, 0.5);
        }
        #score {
            font-size: 24px;
            margin-top: 15px;
            font-weight: bold;
        }
        .controls {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>TETRIS</h1>
    <div id="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
    </div>
    <div id="score">SCORE: 0</div>
    <div class="controls">
        조작법: ← → (이동) | ↑ (회전) | ↓ (소프트 드롭) | Space (하드 드롭)
    </div>

<script>
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');

// 블록 크기 및 그리드 설정 (10x20)
context.scale(20, 20);

// 라인 삭제 시 점수 계산
function arenaSweep() {
    let rowCount = 1;
    outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) {
                continue outer;
            }
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;

        player.score += rowCount * 10;
        rowCount *= 2;
    }
}

// 충돌 감지
function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 &&
               (arena[y + o.y] &&
                arena[y + o.y][x + o.x]) !== 0) {
                return true;
            }
        }
    }
    return false;
}

// 매트릭스 생성
function createMatrix(w, h) {
    const matrix = [];
    while (h--) {
        matrix.push(new Array(w).fill(0));
    }
    return matrix;
}

// 테트리스 미노(블록) 모양 생성
function createPiece(type) {
    if (type === 'I') {
        return [
            [0, 1, 0, 0],
            [0, 1, 0, 0],
            [0, 1, 0, 0],
            [0, 1, 0, 0],
        ];
    } else if (type === 'L') {
        return [
            [0, 2, 0],
            [0, 2, 0],
            [0, 2, 2],
        ];
    } else if (type === 'J') {
        return [
            [0, 3, 0],
            [0, 3, 0],
            [3, 3, 0],
        ];
    } else if (type === 'O') {
        return [
            [4, 4],
            [4, 4],
        ];
    } else if (type === 'Z') {
        return [
            [5, 5, 0],
            [0, 5, 5],
            [0, 0, 0],
        ];
    } else if (type === 'S') {
        return [
            [0, 6, 6],
            [6, 6, 0],
            [0, 0, 0],
        ];
    } else if (type === 'T') {
        return [
            [0, 7, 0],
            [7, 7, 7],
            [0, 0, 0],
        ];
    }
}

// 화면 그리기
function draw() {
    context.fillStyle = '#111';
    context.fillRect(0, 0, canvas.width, canvas.height);

    drawMatrix(arena, {x: 0, y: 0});
    drawMatrix(player.matrix, player.pos);
}

// 블록 색상 배열
const colors = [
    null,
    '#00f0f0', // I (하늘색)
    '#f0a000', // L (오렌지)
    '#0000f0', // J (파란색)
    '#f0f000', // O (노란색)
    '#f00000', // Z (빨간색)
    '#00f000', // S (초록색)
    '#a000f0', // T (보라색)
];

function drawMatrix(matrix, offset) {
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                context.fillStyle = colors[value];
                context.fillRect(x + offset.x, y + offset.y, 1, 1);
                
                // 블록 테두리 효과
                context.strokeStyle = '#222';
                context.lineWidth = 0.05;
                context.strokeRect(x + offset.x, y + offset.y, 1, 1);
            }
        });
    });
}

// 블록 고정하기
function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                arena[y + player.pos.y][x + player.pos.x] = value;
            }
        });
    });
}

// 블록 떨어뜨리기 (소프트 드롭)
function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
        updateScore();
    }
    dropCounter = 0;
}

// 하드 드롭 (스페이스바)
function playerHardDrop() {
    while (!collide(arena, player)) {
        player.pos.y++;
    }
    player.pos.y--;
    merge(arena, player);
    playerReset();
    arenaSweep();
    updateScore();
    dropCounter = 0;
}

// 블록 좌우 이동
function playerMove(dir) {
    player.pos.x += dir;
    if (collide(arena, player)) {
        player.pos.x -= dir;
    }
}

// 다음 블록 리셋 및 게임 오버 판단
function playerReset() {
    const pieces = 'ILJOZST';
    player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
    player.pos.y = 0;
    player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
    
    // 블록을 생성하자마자 충돌하면 게임 오버
    if (collide(arena, player)) {
        alert('게임 오버! 당신의 점수: ' + player.score);
        arena.forEach(row => row.fill(0));
        player.score = 0;
        updateScore();
    }
}

// 블록 회전
function playerRotate(dir) {
    const pos = player.pos.x;
    let offset = 1;
    rotate(player.matrix, dir);
    while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
            rotate(player.matrix, -dir);
            player.pos.x = pos;
            return;
        }
    }
}

// 행렬 회전 알고리즘
function rotate(matrix, dir) {
    for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
            [
                matrix[x][y],
                matrix[y][x],
            ] = [
                matrix[y][x],
                matrix[x][y],
            ];
        }
    }
    if (dir > 0) {
        matrix.forEach(row => row.reverse());
    } else {
        matrix.reverse();
    }
}

let dropCounter = 0;
let dropInterval = 1000; // 블록이 떨어지는 속도 (1초)
let lastTime = 0;

// 메인 게임 루프
function update(time = 0) {
    const deltaTime = time - lastTime;
    lastTime = time;

    dropCounter += deltaTime;
    if (dropCounter > dropInterval) {
        playerDrop();
    }

    draw();
    requestAnimationFrame(update);
}

function updateScore() {
    document.getElementById('score').innerText = `SCORE: ${player.score}`;
}

const arena = createMatrix(12, 20);

const player = {
    pos: {x: 0, y: 0},
    matrix: null,
    score: 0,
};

// 키보드 조작 이벤트
document.addEventListener('keydown', event => {
    if (event.keyCode === 37) {
        playerMove(-1); // 왼쪽 화살표
    } else if (event.keyCode === 39) {
        playerMove(1);  // 오른쪽 화살표
    } else if (event.keyCode === 40) {
        playerDrop();   // 아래쪽 화살표
    } else if (event.keyCode === 38) {
        playerRotate(1); // 위쪽 화살표 (회전)
    } else if (event.keyCode === 32) {
        playerHardDrop(); // 스페이스바 (하드 드롭)
    }
});

// 게임 시작
playerReset();
updateScore();
update();
</script>
</body>
</html>
